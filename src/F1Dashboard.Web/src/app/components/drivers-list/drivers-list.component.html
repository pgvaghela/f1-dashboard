<div class="page">
  <h1 class="page__title">Drivers</h1>
  <p class="page__subtitle">Every driver on the grid.</p>

  @if (loading) {
    <p class="state">Loading drivers…</p>
  }

  @if (error) {
    <p class="state state--error">{{ error }}</p>
  }

  @if (!loading && !error) {
    <table class="data-table">
      <thead>
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Nationality</th>
        </tr>
      </thead>
      <tbody>
        @for (driver of drivers; track driver.id) {
          <tr>
            <td>{{ driver.code }}</td>
            <td>{{ driver.firstName }} {{ driver.lastName }}</td>
            <td>{{ driver.nationality }}</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
